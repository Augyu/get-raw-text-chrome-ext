<!DOCTYPE html>
<html>
<head>
  <title>Tab Links</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 420px;
      padding: 12px;
    }

    textarea {
      width: 100%;
      height: 300px;
      margin-top: 10px;
      font-size: 11px;
      font-family: monospace;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    #status {
      font-size: 12px;
      color: #666;
    }

    .mode-toggle {
      margin-bottom: 8px;
      font-size: 12px;
    }

    label {
      cursor: pointer;
      margin-right: 12px;
    }
  </style>
</head>
<body>
  <h3>Links from Current Window <span id="ver" style="font-size:11px;color:#999;font-weight:normal"></span></h3>
  <script>document.getElementById('ver').textContent = typeof VERSION !== 'undefined' ? `v${VERSION}` : '';</script>

  <div class="mode-toggle">
    <label><input type="radio" name="mode" value="links" /> Links only</label>
    <label><input type="radio" name="mode" value="content" checked /> Links + page content</label>
  </div>

  <div class="controls">
    <button id="loadBtn">Load Tabs</button>
    <button id="copyBtn" disabled>Copy All</button>
    <span id="status">Press "Load Tabs" to start</span>
  </div>

  <textarea id="linksBox" readonly placeholder="Output will appear here..."></textarea>

</body>
</html>
<script src="popup.js"></script>
